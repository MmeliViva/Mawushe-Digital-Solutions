<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — Mawushe Digital Solutions</title>
  <meta name="description" content="Contact Mawushe Digital Solutions for IT support and Microsoft 365 services.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="../assets/css/base.css" rel="stylesheet">
  <link href="../assets/css/style.css" rel="stylesheet">
  <style>body{background:#071021;color:#e6eef8;font-family:Inter, system-ui, Arial, sans-serif;} .container{max-width:820px;margin:48px auto;padding:0 18px;} .card{background:rgba(255,255,255,0.03);padding:20px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}</style>
</head>
<body>
  <header style="padding:20px 18px;">
    <nav style="max-width:1100px;margin:0 auto;display:flex;gap:12px;align-items:center;">
      <a href="../index.html" style="color:#fff;text-decoration:none;font-weight:700;">Mawushe</a>
      <div style="margin-left:24px;display:flex;gap:12px;">
        <a href="../index.html" style="color:#9fb7c9;text-decoration:none;">Home</a>
        <a href="services.html" style="color:#9fb7c9;text-decoration:none;">Services</a>
        <a href="../pages/about.html" style="color:#9fb7c9;text-decoration:none;">About</a>
        <a href="contact.html" style="color:#fff;text-decoration:none;font-weight:600;">Contact</a>
      </div>
    </nav>
  </header>

  <main class="container">
    <h1>Get in touch</h1>
    <p style="color:#bcd3df;">Fill out the form and we will contact you within one business day.</p>

    <div class="card" style="margin-top:18px;">
      <form action="#" method="post" style="display:grid;gap:12px;" aria-label="Contact form">
        <label class="sr-only" for="c-name">Full Name</label>
        <input id="c-name" name="name" placeholder="Full Name" required aria-required="true" style="padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">

        <label class="sr-only" for="c-email">Email address</label>
        <input id="c-email" name="email" placeholder="Email address" type="email" required aria-required="true" style="padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">

        <label class="sr-only" for="c-company">Company (optional)</label>
        <input id="c-company" name="company" placeholder="Company (optional)" style="padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit">

        <label class="sr-only" for="c-message">How can we help?</label>
        <textarea id="c-message" name="message" placeholder="How can we help?" rows="6" style="padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit"></textarea>

        <button type="submit" style="padding:12px 16px;border-radius:8px;border:none;background:#00b3b3;color:#071021;font-weight:700">Send Message</button>
      </form>
    </div>

    <section style="margin-top:20px;display:flex;gap:16px;flex-wrap:wrap;">
      <div style="flex:1;min-width:220px">
        <h4>Call us</h4>
        <p>+27 72 503 6405</p>
      </div>
      <div style="flex:1;min-width:220px">
        <h4>Email</h4>
        <p>hello@mawushe.digital</p>
      </div>
    </section>
  </main>
</body>
</html>
